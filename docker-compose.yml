version: "3.8"

services:

  # ── RTSP server ───────────────────────────────────────────────────────────
  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: vrm-mediamtx
    restart: unless-stopped
    ports:
      - "8554:8554"      # RTSP  → point your NVR here
      - "8888:8888"      # WebRTC (bonus: watch in browser)
      - "8889:8889"      # WebRTC/WHIP
    volumes:
      - ./mediamtx.yml:/mediamtx.yml:ro

  # ── Screenshotter + streamer ───────────────────────────────────────────────
  screenshotter:
    build: .
    container_name: vrm-screenshotter
    restart: unless-stopped
    depends_on:
      - mediamtx
    environment:
      # ── Customize these ───────────────────────────────────────────────────
      VRM_URL:         "https://vrm.victronenergy.com/installation/475708/embed/d5b455cc"
      RTSP_URL:        "rtsp://mediamtx:8554/victron"
      INTERVAL_MS:     "5000"    # 5000 = 1 frame every 5 sec | 1000 = 1 fps
      WIDTH:           "1280"
      HEIGHT:          "800"
      WAIT_AFTER_LOAD: "8000"    # ms to wait for VRM JS to render on first load
    shm_size: "256mb"            # Chromium needs shared memory
