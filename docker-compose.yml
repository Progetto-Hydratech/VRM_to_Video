version: "3.8"

services:

  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: vrm-mediamtx
    restart: unless-stopped
    ports:
      - "8554:8554"
      - "8888:8888"
      - "8889:8889"
    environment:
      MTX_LOGLEVEL: info
      MTX_LOGDESTINATIONS: stdout
      MTX_RTSPADDRESS: :8554
      MTX_PATHS_VICTRON_READANYUSER: "true"
      MTX_PATHS_VICTRON_PUBLISHANYUSER: "true"

  screenshotter:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vrm-screenshotter
    restart: unless-stopped
    depends_on:
      - mediamtx
    environment:
      VRM_URL:         "https://vrm.victronenergy.com/installation/475708/share/102cf9ce"
      RTSP_URL:        "rtsp://mediamtx:8554/victron"
      FPS:             "15"
      WIDTH:           "1280"
      HEIGHT:          "800"
      WAIT_AFTER_LOAD: "15000"
    shm_size: "256mb"
    volumes:
      - /TRE_TB/media:/media

  go2rtc:
    image: alexxit/go2rtc
    container_name: vrm-go2rtc
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./go2rtc.yaml:/config/go2rtc.yaml:ro
    depends_on:
      - mediamtx
