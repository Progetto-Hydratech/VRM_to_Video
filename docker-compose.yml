version: "3.8"

services:

  # ── RTSP server ───────────────────────────────────────────────────────────
  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: vrm-mediamtx
    restart: unless-stopped
    ports:
      - "8554:8554"      # RTSP  → point your NVR here
      - "8888:8888"      # WebRTC (bonus: watch in browser)
      - "8889:8889"      # WebRTC/WHIP
    environment:
      MTX_LOGLEVEL: info
      MTX_LOGDESTINATIONS: stdout
      MTX_RTSPADDRESS: :8554
      MTX_AUTHMETHOD: ""
      MTX_PATHS_VICTRON_READANYUSER: "true"
      MTX_PATHS_VICTRON_PUBLISHANYUSER: "true"

  # ── Screenshotter + streamer ───────────────────────────────────────────────
  screenshotter:
    build: .
    container_name: vrm-screenshotter
    restart: unless-stopped
    depends_on:
      - mediamtx
    environment:
      VRM_URL:         "https://vrm.victronenergy.com/installation/475708/embed/d5b455cc"
      RTSP_URL:        "rtsp://mediamtx:8554/victron"
      INTERVAL_MS:     "5000"
      WIDTH:           "1280"
      HEIGHT:          "800"
      WAIT_AFTER_LOAD: "8000"
    shm_size: "256mb"
